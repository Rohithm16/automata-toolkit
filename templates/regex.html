{% extends 'base.html' %}

{% set page_title = 'Regex - Automata Toolkit' %}

{% block content %}
<header class="page-header">
    <h1>Regex</h1>
    <p>Convert to NFA or DFA.</p>
</header>

<section class="panel mode-panel">
    <h2>Operation</h2>
    <div class="button-row" id="regex-target-switch">
        <button class="choice-btn" data-target="nfa" type="button">Regex -> NFA</button>
        <button class="choice-btn" data-target="dfa" type="button">Regex -> DFA</button>
    </div>
    <div class="status mt-3" id="regex-page-status">Choose output target.</div>
</section>

<section class="page-grid">
    <form id="regex-form" class="panel" autocomplete="off">
        <label for="regex-value">Regex</label>
        <input id="regex-value" placeholder="(a|b)*abb(a|b)">

        <div class="actions-row">
            <button id="regex-example-btn" class="btn btn-primary" type="button">Load Example</button>
            <button id="regex-btn" class="btn btn-primary" type="submit">Convert</button>
        </div>
    </form>

    <section class="panel">
        <h2>Result</h2>
        <div id="regex-status" class="status">Ready</div>
        <div class="actions-row">
            <button id="regex-clear-btn" class="btn btn-primary" type="button">Clear Output</button>
        </div>
        <div id="regex-result" class="result"></div>
    </section>
</section>
{% endblock %}
